openapi: 3.0.0
info:
  title: Pokedex TCG API
  description: API complète pour la gestion d'une collection de cartes Pokémon TCG avec système de decks
  version: 1.0.0
  contact:
    name: Support API
servers:
  - url: http://localhost:3000
    description: Serveur local
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Entrez votre token JWT
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - username
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        username:
          type: string
          example: john_doe
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Card:
      type: object
      required:
        - id
        - name
        - pokedexNumber
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Pikachu
        pokedexNumber:
          type: integer
          example: 25
    Deck:
      type: object
      required:
        - id
        - name
        - userId
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: My First Deck
        userId:
          type: integer
          example: 1
        deckCards:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              cardId:
                type: integer
              card:
                $ref: '#/components/schemas/Card'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Error:
      type: object
      required:
        - erreur
        - message
      properties:
        erreur:
          type: string
          example: Non autorisé
        message:
          type: string
          example: Token manquant.