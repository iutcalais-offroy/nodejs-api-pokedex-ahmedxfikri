name: CI

# Quand ce workflow s'exécute ?
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # On exécute les vérifications
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Récupère le code
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Installe les dépendances
        run: npm ci

      - name: Vérifie le code (ESLint)
        run: npm run lint

      - name: Vérifie le formatage (Prettier)
        run: npm run format:check

      - name: Vérifie les types (TypeScript)
        run: npm run ts:check

      - name: Lance les tests
        run: npm test
